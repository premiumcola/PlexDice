services:
  plexdice:
    build: .
    container_name: plexdice
    ports:
      - "8090:8080"
    volumes:
      # IMPORTANT: ./data is the ONLY persistent state. Settings, Plex
      # token, library cache and AI cache all live here. On Unraid use
      # an absolute path (e.g. /mnt/user/appdata/plexdice/data) instead
      # of ./data to survive stack redeploys.
      - ./data:/data
    env_file: .env
    # Force public resolvers so Plex's *.plex.direct hostnames always resolve, even
    # when the Unraid host's DNS (Pi-hole, missing forwarder) cannot reach them.
    dns:
      - 1.1.1.1
      - 8.8.8.8
    restart: unless-stopped
